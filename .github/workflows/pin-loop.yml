name: Continuous PIN Generator

on:
  workflow_dispatch:

jobs:
  generate-pin:
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔁 Generate PIN continuously (stop by cancelling job)
        shell: cmd
        run: |
          echo Starting PIN generator... (cancel workflow to stop)
          :loop
          set /a pin=%random% %% 9000 + 1000
          echo Generated PIN: %pin%
          timeout /t 1 >nul
          goto loop
