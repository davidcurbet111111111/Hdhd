<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Checker Live/Die</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: #1e1e1e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        textarea { width: 100%; height: 150px; background: #2c2c2c; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; resize: none; box-sizing: border-box; }
        .controls { margin: 20px 0; display: flex; gap: 10px; }
        button { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 1.1em; }
        .live { color: #2ecc71; }
        .die { color: #e74c3c; }
        .unknown { color: #f1c40f; }
        .log-container { height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 0.9em; border: 1px solid #333; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 2px; }
    </style>
</head>
<body>

<div class="container">
    <h2>CC Checker Script</h2>
    <textarea id="ccList" placeholder="Формат: 4444555566667777|01|2028|123"></textarea>

    <div class="controls">
        <button id="startBtn" class="btn-start" onclick="processList()">START 🚀</button>
        <button id="stopBtn" class="btn-stop" onclick="stopProcess()" disabled>STOP 🛑</button>
    </div>

    <div class="stats">
        <span>LIVE: <span id="liveCount" class="live">0</span></span>
        <span>DIE: <span id="dieCount" class="die">0</span></span>
        <span>UNKNOWN: <span id="unkCount" class="unknown">0</span></span>
    </div>

    <div class="log-container" id="logs">
        <div class="log-entry" style="color: #666;">Waiting for start...</div>
    </div>
</div>

<script>
    let isRunning = false;
    let queue = [];

    async function processList() {
        const input = document.getElementById('ccList').value.trim();
        if (!input) return alert("Введите список CC!");

        queue = input.split('\n');
        isRunning = true;
        
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('logs').innerHTML = "";

        for (let i = 0; i < queue.length; i++) {
            if (!isRunning) break;

            let cc = queue[i].trim();
            if (!cc) continue;

            // Имитация задержки запроса к API
            await new Promise(resolve => setTimeout(resolve, 800));

            // Логика определения статуса (имитация)
            const rand = Math.random();
            let status = 'unknown';
            if (rand > 0.7) status = 'die';
            else if (rand > 0.4) status = 'live';

            addLog(cc, status);
        }

        stopProcess();
    }

    function stopProcess() {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }

    function addLog(cc, status) {
        const logContainer = document.getElementById('logs');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        let statusText = status.toUpperCase();
        let colorClass = status;
        
        entry.innerHTML = `<span style="color: #888;">[#]</span> ${cc} — <span class="${colorClass}">${statusText}</span>`;
        logContainer.prepend(entry);

        // Обновление счетчиков
        const countId = status === 'live' ? 'liveCount' : (status === 'die' ? 'dieCount' : 'unkCount');
        const el = document.getElementById(countId);
        el.innerText = parseInt(el.innerText) + 1;
    }
</script>

</body>
</html>
